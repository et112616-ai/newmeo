services:
  - type: web
    name: stock-line-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: IMAGE_URL
        sync: false
      - key: FINMIND_TOKEN
        sync: false
